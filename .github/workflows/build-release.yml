name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0
  PNPM_VERSION: 10.28.2
  NODE_VERSION: 23

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build
        shell: pwsh
        run: wails build -clean -platform windows/amd64 -nsis -webview2 download

      - name: Collect artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path build/bin/hermes-dock.exe -DestinationPath "dist/hermes-dock-$version-windows-amd64-portable.zip" -Force
          Copy-Item build/bin/*-installer.exe "dist/hermes-dock-$version-windows-amd64-installer.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/*
          if-no-files-found: error

  build-macos:
    name: macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build
        run: wails build -clean -platform darwin/arm64

      - name: Collect artifacts
        run: |
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          ditto -c -k --keepParent build/bin/hermes-dock.app "dist/hermes-dock-${version}-darwin-arm64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: dist/*
          if-no-files-found: error

  build-linux:
    name: Linux amd64 Debian 13
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            file \
            tar \
            unzip \
            xz-utils \
            zip \
            zstd \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build
        run: wails build -clean -platform linux/amd64 -tags webkit2_41

      - name: Package
        run: |
          version="${GITHUB_REF_NAME}"
          deb_version="${version#v}"
          mkdir -p dist
          tar -C build/bin -czf "dist/hermes-dock-${version}-linux-amd64.tar.gz" hermes-dock

          package_root="dist/deb/hermes-dock"
          install -Dm755 build/bin/hermes-dock "$package_root/usr/bin/hermes-dock"
          install -Dm644 build/appicon.png "$package_root/usr/share/pixmaps/hermes-dock.png"
          mkdir -p "$package_root/usr/share/applications"
          cat > "$package_root/usr/share/applications/hermes-dock.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Hermes Dock
          Comment=Hermes Agent Docker launcher
          Exec=hermes-dock
          Icon=hermes-dock
          Terminal=false
          Categories=Utility;
          DESKTOP

          mkdir -p "$package_root/DEBIAN"
          cat > "$package_root/DEBIAN/control" <<CONTROL
          Package: hermes-dock
          Version: $deb_version
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Hermes Dock Maintainers
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0
          Description: Hermes Agent Docker launcher
           Desktop launcher for managing a local Hermes Agent Docker instance.
          CONTROL

          dpkg-deb --build "$package_root" "dist/hermes-dock-${version}-linux-amd64.deb"
          rm -rf dist/deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-debian13
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-linux

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
