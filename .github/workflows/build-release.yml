name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0
  PNPM_VERSION: 10.28.2
  NODE_VERSION: 23

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile
      - name: Test Go packages
        run: go test ./...
      - name: Test frontend
        run: pnpm --dir frontend test
      - name: Build frontend
        run: pnpm --dir frontend run build

  build-windows:
    name: Windows x64
    needs: verify
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $makensis = @(
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
            "$env:ProgramFiles\NSIS\makensis.exe",
            "$env:ChocolateyInstall\lib\nsis\tools\makensis.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $makensis) {
            throw "makensis.exe not found after installing NSIS"
          }
          Split-Path $makensis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $makensis /VERSION

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build profile runner
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/windows/profile-runner | Out-Null
          $env:CGO_ENABLED = "0"
          $env:GOOS = "linux"
          $env:GOARCH = "amd64"
          go build -buildvcs=false -trimpath -ldflags="-s -w" -o build/windows/profile-runner/hermes-profile-runner-linux-amd64 ./cmd/hermes-profile-runner

      - name: Build
        shell: pwsh
        run: wails build -clean -platform windows/amd64 -nsis -webview2 download

      - name: Collect artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force dist/windows-portable | Out-Null
          Copy-Item build/bin/hermes-dock.exe dist/windows-portable/hermes-dock.exe
          Copy-Item build/windows/profile-runner/hermes-profile-runner-linux-amd64 dist/windows-portable/hermes-profile-runner-linux-amd64
          Compress-Archive -Path dist/windows-portable/* -DestinationPath "dist/hermes-dock-$version-windows-amd64-portable.zip" -Force
          Remove-Item -Recurse -Force dist/windows-portable
          $installer = Get-ChildItem build/bin -Filter "*-installer.exe" | Select-Object -First 1
          if (-not $installer) {
            Get-ChildItem build/bin | Format-Table Name, Length
            throw "Windows installer was not generated"
          }
          Copy-Item $installer.FullName "dist/hermes-dock-$version-windows-amd64-installer.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/*
          if-no-files-found: error

  build-macos:
    name: macOS arm64
    needs: verify
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build
        run: wails build -clean -platform darwin/arm64 -v 2 -nocolour

      - name: Collect artifacts
        run: |
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          runner="build/profile-runner/hermes-profile-runner-linux-arm64"
          mkdir -p "$(dirname "$runner")"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -buildvcs=false -trimpath -ldflags="-s -w" -o "$runner" ./cmd/hermes-profile-runner
          install -m 755 "$runner" build/bin/hermes-dock.app/Contents/MacOS/hermes-profile-runner-linux-arm64
          ditto -c -k --keepParent build/bin/hermes-dock.app "dist/hermes-dock-${version}-darwin-arm64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: dist/*
          if-no-files-found: error

  build-linux:
    name: Linux amd64 Debian 13
    needs: verify
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            file \
            tar \
            unzip \
            xz-utils \
            zip \
            zstd \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build
        run: wails build -clean -platform linux/amd64 -tags webkit2_41

      - name: Package
        run: |
          version="${GITHUB_REF_NAME}"
          deb_version="${version#v}"
          mkdir -p dist
          runner="build/profile-runner/hermes-profile-runner-linux-amd64"
          mkdir -p "$(dirname "$runner")"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -trimpath -ldflags="-s -w" -o "$runner" ./cmd/hermes-profile-runner
          install -Dm755 "$runner" build/bin/hermes-profile-runner
          tar -C build/bin -czf "dist/hermes-dock-${version}-linux-amd64.tar.gz" hermes-dock hermes-profile-runner

          package_root="dist/deb/hermes-dock"
          install -Dm755 build/bin/hermes-dock "$package_root/opt/hermes-dock/hermes-dock"
          install -Dm755 "$runner" "$package_root/opt/hermes-dock/hermes-profile-runner"
          install -Dm644 build/appicon.png "$package_root/opt/hermes-dock/hermes-dock.png"
          mkdir -p "$package_root/usr/share/applications"
          cat > "$package_root/usr/share/applications/hermes-dock.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Hermes Dock
          Comment=Hermes Agent Docker launcher
          Exec=/opt/hermes-dock/hermes-dock
          Icon=/opt/hermes-dock/hermes-dock.png
          Terminal=false
          Categories=Utility;
          DESKTOP

          mkdir -p "$package_root/DEBIAN"
          cat > "$package_root/DEBIAN/control" <<CONTROL
          Package: hermes-dock
          Version: $deb_version
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Hermes Dock Maintainers
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0
          Description: Hermes Agent Docker launcher
           Desktop launcher for managing a local Hermes Agent Docker instance.
          CONTROL

          dpkg-deb --build "$package_root" "dist/hermes-dock-${version}-linux-amd64.deb"
          rm -rf dist/deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-debian13
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
