name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  WAILS_VERSION: v2.12.0
  PNPM_VERSION: 10.28.2
  NODE_VERSION: 23

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout amd64 runtime dependencies
        run: git lfs pull --include="runtime-deps/linux-amd64/**" --exclude=""
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile
      - name: Test frontend
        run: pnpm --dir frontend test
      - name: Build frontend
        run: pnpm --dir frontend run build
      - name: Test Go packages
        run: go test ./...
      - name: Verify Wails bindings
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          wails generate module
          git -c core.fileMode=false diff --ignore-space-at-eol --exit-code -- frontend/wailsjs
