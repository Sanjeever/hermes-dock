name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-production
  cancel-in-progress: false

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10.28.2

jobs:
  deploy:
    name: Build and deploy website
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir website install --frozen-lockfile

      - name: Test website
        run: pnpm --dir website test

      - name: Build website
        run: pnpm --dir website build

      - name: Smoke test server bundle
        env:
          NODE_ENV: production
          PORT: "3100"
          SMTP_HOST: smtp.example.com
          SMTP_PORT: "465"
          SMTP_SECURE: "true"
          SMTP_USER: test@example.com
          SMTP_PASS: test-password
          SMTP_FROM: test@example.com
          MAIL_TO: recipient@example.com
        run: |
          cp website/dist-server/index.js server-bundle.cjs
          node --check server-bundle.cjs
          node server-bundle.cjs >server-bundle.log 2>&1 &
          server_pid=$!

          cleanup() {
              kill "$server_pid" >/dev/null 2>&1 || true
              wait "$server_pid" >/dev/null 2>&1 || true
              rm -f server-bundle.cjs server-bundle.log
          }
          trap cleanup EXIT

          healthy=false
          for attempt in $(seq 1 10); do
              if curl -fs http://127.0.0.1:3100/healthz >/dev/null 2>&1; then
                  healthy=true
                  break
              fi
              sleep 1
          done

          if [ "$healthy" != "true" ]; then
              cat server-bundle.log
              exit 1
          fi

      - name: Create deployment bundles
        run: |
          tar -C website/dist \
            -czf "qizhih-website-dist-${GITHUB_SHA}.tar.gz" \
            .

          cp \
            website/dist-server/index.js \
            "qizhih-website-server-${GITHUB_SHA}.js"

          tar -tzf "qizhih-website-dist-${GITHUB_SHA}.tar.gz" >/dev/null
          test -s "qizhih-website-server-${GITHUB_SHA}.js"

      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.WEBSITE_DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.WEBSITE_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          install -m 600 /dev/null ~/.ssh/known_hosts
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Upload deployment bundles
        env:
          DEPLOY_HOST: ${{ secrets.WEBSITE_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.WEBSITE_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.WEBSITE_DEPLOY_USER }}
        run: |
          scp \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -P "$DEPLOY_PORT" \
            "qizhih-website-dist-${GITHUB_SHA}.tar.gz" \
            "qizhih-website-server-${GITHUB_SHA}.js" \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.WEBSITE_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.WEBSITE_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.WEBSITE_DEPLOY_USER }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_SHA='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          frontend_archive="/tmp/qizhih-website-dist-${DEPLOY_SHA}.tar.gz"
          server_bundle="/tmp/qizhih-website-server-${DEPLOY_SHA}.js"
          frontend_dir="/home/nginx/html/qizhih-website"
          server_dir="/opt/qizhih-website-server"

          cleanup() {
              rm -f "$frontend_archive" "$server_bundle"
          }
          trap cleanup EXIT

          test -f "$frontend_archive"
          test -s "$server_bundle"
          test -f "$server_dir/docker-compose.yaml"
          test -s "$server_dir/index.js"
          test ! -e "$server_dir/package.json"
          test ! -e "$server_dir/pnpm-lock.yaml"
          test ! -e "$server_dir/server"
          test ! -e "$server_dir/node-modules"

          cd "$server_dir"
          compose_config="$(docker compose config)"
          if ! grep -Fq -- "/app/index.js" <<<"$compose_config" ||
             grep -Eq -- '(^|[[:space:]])server/index\.js([[:space:]]|$)|pnpm install|node_modules' <<<"$compose_config"; then
              echo "官网 API 服务器尚未迁移到根目录 index.js，已停止部署。" >&2
              exit 1
          fi
          unset compose_config

          tar -tzf "$frontend_archive" >/dev/null

          rm -rf "$frontend_dir"
          mkdir -p "$frontend_dir"
          tar -xzf "$frontend_archive" -C "$frontend_dir"
          test -f "$frontend_dir/index.html"

          docker compose down

          install -m 0644 "$server_bundle" "$server_dir/index.js.next"
          mv "$server_dir/index.js.next" "$server_dir/index.js"
          test -s "$server_dir/index.js"

          docker compose up -d

          healthy=false
          for attempt in $(seq 1 36); do
              if docker compose exec -T server \
                  node -e "fetch('http://127.0.0.1:3000/healthz').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))" \
                  >/dev/null 2>&1; then
                  healthy=true
                  break
              fi
              sleep 5
          done

          if [ "$healthy" != "true" ]; then
              docker compose ps
              docker compose logs --tail=100 server
              exit 1
          fi

          docker compose ps
          REMOTE

      - name: Verify public website
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 3 \
            https://ai.sqyl.online/ \
            >/dev/null

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 3 \
            https://ai.sqyl.online/healthz
